[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Redirect /api/search to the serverless function
[[redirects]]
  from = "/api/search"
  to = "/.netlify/functions/search"
  status = 200

# SPA fallback — must be LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
