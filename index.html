<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Fitfolio — Your smart wardrobe manager." />
  <title>Fitfolio — Smart Wardrobe Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none' stroke='%238B6914' stroke-width='1.8'%3E%3Crect x='4' y='3' width='24' height='26' rx='2'/%3E%3Cline x1='16' y1='3' x2='16' y2='29'/%3E%3Ccircle cx='13' cy='16' r='1.2' fill='%238B6914' stroke='none'/%3E%3Ccircle cx='19' cy='16' r='1.2' fill='%238B6914' stroke='none'/%3E%3C/svg%3E" />
</head>

<body>
  <!-- ========== SPLASH: Cinematic Wardrobe Reveal ========== -->
  <div id="splash">
    <div class="splash-bg"></div>
    <div class="splash-door splash-door-left">
      <div class="splash-door-panel">
        <div class="splash-door-grain"></div>
        <div class="splash-door-knob"></div>
        <div class="splash-door-hinge splash-door-hinge-top"></div>
        <div class="splash-door-hinge splash-door-hinge-bottom"></div>
        <div class="splash-door-trim"></div>
      </div>
    </div>
    <div class="splash-door splash-door-right">
      <div class="splash-door-panel">
        <div class="splash-door-grain"></div>
        <div class="splash-door-knob"></div>
        <div class="splash-door-hinge splash-door-hinge-top"></div>
        <div class="splash-door-hinge splash-door-hinge-bottom"></div>
        <div class="splash-door-trim"></div>
      </div>
    </div>
    <div class="splash-keyhole"></div>
    <div class="splash-particles" id="splashParticles"></div>
    <div class="splash-brand">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5" width="52" height="52">
        <rect x="4" y="3" width="24" height="26" rx="2" />
        <line x1="16" y1="3" x2="16" y2="29" />
        <circle cx="13" cy="16" r="1.2" fill="currentColor" stroke="none" />
        <circle cx="19" cy="16" r="1.2" fill="currentColor" stroke="none" />
      </svg>
      <span>Fitfolio</span>
      <em>Your Smart Wardrobe</em>
    </div>
  </div>

  <!-- ========== MAIN APP ========== -->
  <div id="app" class="app-hidden">
    <!-- Top bar for theme/gender controls -->
    <header id="topBar">
      <div class="topbar-brand">
        <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5" width="22" height="22">
          <rect x="4" y="3" width="24" height="26" rx="2" />
          <line x1="16" y1="3" x2="16" y2="29" />
          <circle cx="13" cy="16" r="1.2" fill="currentColor" stroke="none" />
          <circle cx="19" cy="16" r="1.2" fill="currentColor" stroke="none" />
        </svg>
        <span class="topbar-title">Fitfolio</span>
      </div>
      <div class="topbar-controls">
        <div class="gender-toggle" id="genderToggle">
          <button class="gender-btn active" data-gender="all">All</button>
          <button class="gender-btn" data-gender="male">Male</button>
          <button class="gender-btn" data-gender="female">Female</button>
        </div>
        <div class="theme-switch" id="themeSwitch">
          <button class="theme-btn" data-theme-set="light" title="Light">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
              <circle cx="12" cy="12" r="5" />
              <line x1="12" y1="1" x2="12" y2="3" />
              <line x1="12" y1="21" x2="12" y2="23" />
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
          </button>
          <button class="theme-btn active" data-theme-set="dark" title="Dark">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
          <button class="theme-btn" data-theme-set="system" title="System">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
              <rect x="2" y="3" width="20" height="14" rx="2" />
              <line x1="8" y1="21" x2="16" y2="21" />
              <line x1="12" y1="17" x2="12" y2="21" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- The 3 Cabinets (Navigation) -->
    <div id="cabinetRow">
      <div class="cabinet" data-cabinet="wardrobe" id="cabinetWardrobe">
        <div class="cabinet-door">
          <div class="cabinet-door-inner">
            <div class="cabinet-wood-grain"></div>
            <div class="cabinet-label">
              <svg class="cabinet-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <rect x="3" y="2" width="18" height="20" rx="2" />
                <line x1="12" y1="2" x2="12" y2="22" />
                <circle cx="9" cy="12" r="1" fill="currentColor" stroke="none" />
                <circle cx="15" cy="12" r="1" fill="currentColor" stroke="none" />
              </svg>
              <span>Wardrobe</span>
            </div>
            <div class="cabinet-handle"></div>
            <!-- Hinges -->
            <div class="cabinet-hinge cabinet-hinge-top"></div>
            <div class="cabinet-hinge cabinet-hinge-mid"></div>
            <div class="cabinet-hinge cabinet-hinge-bottom"></div>
          </div>
        </div>
        <div class="cabinet-interior">
          <div class="cabinet-content" id="wardrobeContent"></div>
        </div>
      </div>

      <div class="cabinet" data-cabinet="outfits" id="cabinetOutfits">
        <div class="cabinet-door">
          <div class="cabinet-door-inner">
            <div class="cabinet-wood-grain"></div>
            <div class="cabinet-label">
              <svg class="cabinet-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <polygon points="12 2 2 7 12 12 22 7 12 2" />
                <polyline points="2 17 12 22 22 17" />
                <polyline points="2 12 12 17 22 12" />
              </svg>
              <span>Outfits</span>
            </div>
            <div class="cabinet-handle"></div>
            <div class="cabinet-hinge cabinet-hinge-top"></div>
            <div class="cabinet-hinge cabinet-hinge-mid"></div>
            <div class="cabinet-hinge cabinet-hinge-bottom"></div>
          </div>
        </div>
        <div class="cabinet-interior">
          <div class="cabinet-content" id="outfitsContent"></div>
        </div>
      </div>

      <div class="cabinet" data-cabinet="calendar" id="cabinetCalendar">
        <div class="cabinet-door">
          <div class="cabinet-door-inner">
            <div class="cabinet-wood-grain"></div>
            <div class="cabinet-label">
              <svg class="cabinet-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <rect x="3" y="4" width="18" height="18" rx="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
              </svg>
              <span>Calendar</span>
            </div>
            <div class="cabinet-handle"></div>
            <div class="cabinet-hinge cabinet-hinge-top"></div>
            <div class="cabinet-hinge cabinet-hinge-mid"></div>
            <div class="cabinet-hinge cabinet-hinge-bottom"></div>
          </div>
        </div>
        <div class="cabinet-interior">
          <div class="cabinet-content" id="calendarContent"></div>
        </div>
      </div>

      <div class="cabinet" data-cabinet="trends" id="cabinetTrends">
        <div class="cabinet-door">
          <div class="cabinet-door-inner">
            <div class="cabinet-wood-grain"></div>
            <div class="cabinet-label">
              <svg class="cabinet-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <path
                  d="M12 3v3m0 12v3m-6-9H3m18 0h-3m-2.64-5.36l-2.12 2.12m8.48 8.48l-2.12-2.12M5.64 5.64l2.12 2.12M4.93 19.07l2.12-2.12" />
                <circle cx="12" cy="12" r="2" />
              </svg>
              <span>Trends</span>
            </div>
            <div class="cabinet-handle"></div>
            <div class="cabinet-hinge cabinet-hinge-top"></div>
            <div class="cabinet-hinge cabinet-hinge-mid"></div>
            <div class="cabinet-hinge cabinet-hinge-bottom"></div>
          </div>
        </div>
        <div class="cabinet-interior">
          <div class="cabinet-content" id="trendsContent"></div>
        </div>
      </div>
    </div>

    <!-- Back button (visible when a cabinet is open) -->
    <button class="back-btn" id="backBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
        <polyline points="15 18 9 12 15 6" />
      </svg>
      Close Cabinet
    </button>
  </div>

  <!-- Add Item Modal -->
  <div class="modal-overlay" id="addItemModal">
    <div class="modal">
      <div class="modal-header">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"
            style="vertical-align:-3px;margin-right:8px;">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
          Add Clothing Item
        </h2>
        <button class="modal-close" id="closeAddModal">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>
      <form id="addItemForm">
        <div class="upload-area" id="uploadArea">
          <div class="upload-placeholder" id="uploadPlaceholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
            <p>Drop image or click to upload</p>
            <span class="upload-hint">PNG, JPG up to 5MB</span>
          </div>
          <img id="imagePreview" class="image-preview" alt="Preview" />
          <input type="file" id="imageInput" accept="image/*" hidden />
        </div>
        <div class="form-group">
          <label for="itemName">Name</label>
          <input type="text" id="itemName" placeholder="e.g. Navy Oxford Shirt" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="itemCategory">Category</label>
            <select id="itemCategory" required>
              <optgroup label="Tops">
                <option value="t-shirt">T-Shirt</option>
                <option value="shirt">Shirt</option>
                <option value="blouse">Blouse</option>
                <option value="sweater">Sweater</option>
                <option value="hoodie">Hoodie</option>
                <option value="jacket">Jacket</option>
                <option value="coat">Coat</option>
                <option value="tank-top">Tank Top</option>
                <option value="crop-top">Crop Top</option>
              </optgroup>
              <optgroup label="Bottoms">
                <option value="jeans">Jeans</option>
                <option value="trousers">Trousers</option>
                <option value="chinos">Chinos</option>
                <option value="shorts">Shorts</option>
                <option value="skirt">Skirt</option>
                <option value="leggings">Leggings</option>
                <option value="joggers">Joggers</option>
              </optgroup>
              <optgroup label="Full-body">
                <option value="dress">Dress</option>
                <option value="jumpsuit">Jumpsuit</option>
                <option value="romper">Romper</option>
              </optgroup>
              <optgroup label="Footwear">
                <option value="sneakers">Sneakers</option>
                <option value="boots">Boots</option>
                <option value="heels">Heels</option>
                <option value="sandals">Sandals</option>
                <option value="loafers">Loafers</option>
                <option value="flats">Flats</option>
              </optgroup>
              <optgroup label="Accessories">
                <option value="watch">Watch</option>
                <option value="bag">Bag</option>
                <option value="hat">Hat</option>
                <option value="scarf">Scarf</option>
                <option value="belt">Belt</option>
                <option value="jewelry">Jewelry</option>
                <option value="sunglasses">Sunglasses</option>
                <option value="hijab">Hijab</option>
              </optgroup>
            </select>
          </div>
          <div class="form-group">
            <label for="itemGender">For</label>
            <select id="itemGender" required>
              <option value="unisex">Unisex</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="itemColor">Color</label>
            <div class="color-input-wrap">
              <input type="color" id="itemColorPicker" value="#3b82f6" />
              <input type="text" id="itemColor" placeholder="e.g. Navy Blue" required />
            </div>
          </div>
          <div class="form-group">
            <label for="itemSeason">Season</label>
            <select id="itemSeason">
              <option value="all">All Seasons</option>
              <option value="summer">Summer</option>
              <option value="winter">Winter</option>
              <option value="spring">Spring/Fall</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          <span>Add to Wardrobe</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
          </svg>
        </button>
      </form>
    </div>
  </div>

  <div id="toastContainer"></div>
  <script type="module" src="/src/main.js"></script>
</body>

</html>
